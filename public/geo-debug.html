<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Geo Debug</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; padding: 20px; padding-top: calc(env(safe-area-inset-top, 0px) + 20px); background: #111; color: #eee; }
  h1 { font-size: 18px; margin-bottom: 16px; }
  .card { background: #222; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .label { color: #999; font-size: 12px; margin-bottom: 4px; }
  .value { font-size: 14px; font-family: monospace; word-break: break-all; }
  .ok { color: #4ade80; }
  .fail { color: #f87171; }
  .warn { color: #fbbf24; }
  button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
  .btn-primary { background: #ee9d2b; color: white; }
  .btn-secondary { background: #333; color: white; }
  #log { background: #1a1a1a; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; line-height: 1.6; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
</style>
</head>
<body>

<h1>Geo Debug — VIBE PWA</h1>

<div class="card">
  <div class="label">Mode</div>
  <div class="value" id="mode">—</div>
</div>

<div class="card">
  <div class="label">navigator.geolocation</div>
  <div class="value" id="hasGeo">—</div>
</div>

<div class="card">
  <div class="label">navigator.permissions (geolocation)</div>
  <div class="value" id="permState">—</div>
</div>

<div class="card">
  <div class="label">HTTPS</div>
  <div class="value" id="https">—</div>
</div>

<div class="card">
  <div class="label">Service Workers</div>
  <div class="value" id="sw">—</div>
</div>

<div class="card">
  <div class="label">User Agent</div>
  <div class="value" id="ua" style="font-size:11px;">—</div>
</div>

<button class="btn-primary" id="btnGeo">Tester getCurrentPosition (HIGH accuracy)</button>
<button class="btn-secondary" id="btnGeoLow">Tester getCurrentPosition (LOW accuracy)</button>
<button class="btn-secondary" id="btnWatch">Tester watchPosition</button>

<div class="card">
  <div class="label">Résultat</div>
  <div class="value" id="result">—</div>
</div>

<div class="card">
  <div class="label">Log</div>
  <div id="log"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const log = msg => {
  const ts = new Date().toLocaleTimeString();
  $('log').textContent += `[${ts}] ${msg}\n`;
  $('log').scrollTop = $('log').scrollHeight;
};

// Mode detection
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
$('mode').textContent = isStandalone ? 'PWA STANDALONE' : 'NAVIGATEUR';
$('mode').className = 'value ' + (isStandalone ? 'warn' : 'ok');

// Geolocation API
$('hasGeo').textContent = 'geolocation' in navigator ? 'OUI' : 'NON';
$('hasGeo').className = 'value ' + ('geolocation' in navigator ? 'ok' : 'fail');

// HTTPS
$('https').textContent = location.protocol + '//' + location.host;
$('https').className = 'value ' + (location.protocol === 'https:' ? 'ok' : 'fail');

// User Agent
$('ua').textContent = navigator.userAgent;

// Permissions API
(async () => {
  try {
    if (navigator.permissions) {
      const perm = await navigator.permissions.query({ name: 'geolocation' });
      $('permState').textContent = perm.state;
      $('permState').className = 'value ' + (perm.state === 'granted' ? 'ok' : perm.state === 'denied' ? 'fail' : 'warn');
      perm.addEventListener('change', () => {
        $('permState').textContent = perm.state + ' (changed!)';
        log('Permission changed to: ' + perm.state);
      });
    } else {
      $('permState').textContent = 'API non disponible (normal sur iOS Safari)';
      $('permState').className = 'value warn';
    }
  } catch (e) {
    $('permState').textContent = 'Erreur: ' + e.message;
    $('permState').className = 'value fail';
  }
})();

// Service Workers
(async () => {
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      if (regs.length === 0) {
        $('sw').textContent = 'Aucun SW enregistré';
      } else {
        $('sw').textContent = regs.map(r => `scope: ${r.scope} | active: ${r.active?.scriptURL || 'none'}`).join('\n');
      }
    } else {
      $('sw').textContent = 'Non supporté';
    }
  } catch (e) {
    $('sw').textContent = 'Erreur: ' + e.message;
  }
})();

function showResult(pos) {
  const msg = `LAT: ${pos.coords.latitude}\nLNG: ${pos.coords.longitude}\nAccuracy: ${pos.coords.accuracy}m\nTimestamp: ${new Date(pos.timestamp).toLocaleTimeString()}`;
  $('result').textContent = msg;
  $('result').className = 'value ok';
  log('SUCCESS — ' + msg.replace(/\n/g, ' | '));
}

function showError(err) {
  const codes = { 1: 'PERMISSION_DENIED', 2: 'POSITION_UNAVAILABLE', 3: 'TIMEOUT' };
  const msg = `Code: ${err.code} (${codes[err.code] || '?'})\nMessage: ${err.message}`;
  $('result').textContent = msg;
  $('result').className = 'value fail';
  log('ERROR — ' + msg.replace(/\n/g, ' | '));
}

$('btnGeo').addEventListener('click', () => {
  log('getCurrentPosition(HIGH) called...');
  $('result').textContent = 'En attente...';
  $('result').className = 'value warn';
  navigator.geolocation.getCurrentPosition(showResult, showError, {
    enableHighAccuracy: true,
    timeout: 20000,
    maximumAge: 0,
  });
});

$('btnGeoLow').addEventListener('click', () => {
  log('getCurrentPosition(LOW) called...');
  $('result').textContent = 'En attente...';
  $('result').className = 'value warn';
  navigator.geolocation.getCurrentPosition(showResult, showError, {
    enableHighAccuracy: false,
    timeout: 20000,
    maximumAge: 0,
  });
});

$('btnWatch').addEventListener('click', () => {
  log('watchPosition called...');
  $('result').textContent = 'Watch actif...';
  $('result').className = 'value warn';
  navigator.geolocation.watchPosition(
    (pos) => { showResult(pos); log('watchPosition fired'); },
    showError,
    { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
  );
});

log('Page loaded. Mode: ' + (isStandalone ? 'STANDALONE' : 'BROWSER'));
</script>
</body>
</html>
